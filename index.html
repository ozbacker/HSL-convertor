<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Color Space Hub</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #121214;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .card {
            background: #1a1a1e;
            padding: 24px;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            width: 360px;
        }
        h2 { margin-top: 0; font-weight: 600; text-align: center; color: #00ffcc; }
        .preview {
            width: 100%;
            height: 120px;
            border-radius: 12px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .select-group { margin-bottom: 20px; }
        select {
            width: 100%;
            padding: 10px;
            background: #26262b;
            color: white;
            border: 1px solid #444;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
        }
        .control-group { margin-bottom: 16px; }
        .hidden { display: none !important; }
        label { display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 6px; color: #aaa; }
        input[type="range"] {
            width: 100%;
            margin: 0;
            accent-color: #00ffcc;
        }
        .palette-section {
            margin-top: 20px;
        }
        .palette-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-top: 8px;
        }
        .palette-box {
            height: 50px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.1);
            position: relative;
            cursor: pointer;
        }
        .palette-label {
            font-size: 10px;
            color: #aaa;
            text-align: center;
            margin-top: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .outputs {
            background: #26262b;
            padding: 14px;
            border-radius: 8px;
            margin-top: 20px;
        }
        .output-title {
            font-size: 12px;
            color: #888;
            text-transform: uppercase;
            margin-bottom: 10px;
            letter-spacing: 1px;
            font-weight: bold;
        }
        .output-row {
            display: flex;
            justify-content: space-between;
            font-family: monospace;
            font-size: 14px;
            margin-bottom: 10px;
            cursor: pointer;
            padding: 4px;
            border-radius: 4px;
            transition: background 0.2s;
        }
        .output-row:hover { background: rgba(255,255,255,0.05); }
        .label-text { color: #aaa; }
        .value-text { color: #fff; font-weight: bold; }
        .toast {
            position: fixed;
            bottom: 20px;
            background: #00ffcc;
            color: #121214;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>Color Hub Pro</h2>
    <div id="preview" class="preview"></div>

    <div class="select-group">
        <label>Select Input Mode:</label>
        <select id="mode-selector">
            <option value="RGB">RGB (Red, Green, Blue)</option>
            <option value="HSL">HSL (Hue, Saturation, Lightness)</option>
            <option value="HSV">HSV (Hue, Saturation, Value)</option>
            <option value="CMYK">CMYK (Cyan, Magenta, Yellow, Black)</option>
            <option value="YUV">YUV (Luma, Chroma U, Chroma V)</option>
        </select>
    </div>

    <div class="control-group" id="cg1"><label><span id="sl1-lbl">Red</span><span id="sl1-val">0</span></label><input type="range" id="slider1" min="0" max="255" value="0"></div>
    <div class="control-group" id="cg2"><label><span id="sl2-lbl">Green</span><span id="sl2-val">170</span></label><input type="range" id="slider2" min="0" max="255" value="170"></div>
    <div class="control-group" id="cg3"><label><span id="sl3-lbl">Blue</span><span id="sl3-val">255</span></label><input type="range" id="slider3" min="0" max="255" value="255"></div>
    <div class="control-group hidden" id="cg4"><label><span id="sl4-lbl">Black (K)</span><span id="sl4-val">0%</span></label><input type="range" id="slider4" min="0" max="100" value="0"></div>

    <div class="palette-section">
        <div class="output-title">Auto-Generated Palette</div>
        <div class="palette-grid">
            <div><div id="p-comp" class="palette-box" onclick="copyValue(this.dataset.color)"></div><div class="palette-label">Opposite</div></div>
            <div><div id="p-an1" class="palette-box" onclick="copyValue(this.dataset.color)"></div><div class="palette-label">Analog L</div></div>
            <div><div id="p-an2" class="palette-box" onclick="copyValue(this.dataset.color)"></div><div class="palette-label">Analog R</div></div>
            <div><div id="p-mono" class="palette-box" onclick="copyValue(this.dataset.color)"></div><div class="palette-label">Dark Shade</div></div>
        </div>
    </div>

    <div class="outputs">
        <div class="output-title">Outputs (Tap row to copy)</div>
        <div class="output-row" onclick="copyTextFromElement('out-hex')"><span class="label-text">HEX:</span><span id="out-hex" class="value-text">-</span></div>
        <div class="output-row" onclick="copyTextFromElement('out-rgb')"><span class="label-text">RGB:</span><span id="out-rgb" class="value-text">-</span></div>
        <div class="output-row" onclick="copyTextFromElement('out-hsl')"><span class="label-text">HSL:</span><span id="out-hsl" class="value-text">-</span></div>
        <div class="output-row" onclick="copyTextFromElement('out-hsv')"><span class="label-text">HSV:</span><span id="out-hsv" class="value-text">-</span></div>
        <div class="output-row" onclick="copyTextFromElement('out-cmyk')"><span class="label-text">CMYK:</span><span id="out-cmyk" class="value-text">-</span></div>
        <div class="output-row" onclick="copyTextFromElement('out-yuv')"><span class="label-text">YUV:</span><span id="out-yuv" class="value-text">-</span></div>
    </div>
</div>

<div id="toast" class="toast">Copied to Clipboard!</div>

<script>
    const modeSel = document.getElementById('mode-selector');
    const s1 = document.getElementById('slider1'); const s2 = document.getElementById('slider2');
    const s3 = document.getElementById('slider3'); const s4 = document.getElementById('slider4');
    const cg4 = document.getElementById('cg4');
    
    const lbl1 = document.getElementById('sl1-lbl'); const lbl2 = document.getElementById('sl2-lbl');
    const lbl3 = document.getElementById('sl3-lbl'); const lbl4 = document.getElementById('sl4-lbl');
    
    const val1 = document.getElementById('sl1-val'); const val2 = document.getElementById('sl2-val');
    const val3 = document.getElementById('sl3-val'); const val4 = document.getElementById('sl4-val');
    const preview = document.getElementById('preview');
    const toast = document.getElementById('toast');

    // Color conversion math
    function hslToRgb(h, s, l) {
        s /= 100; l /= 100;
        const c = (1 - Math.abs(2 * l - 1)) * s, x = c * (1 - Math.abs((h / 60) % 2 - 1)), m = l - c / 2;
        let r=0, g=0, b=0;
        if (h<60) {r=c; g=x;} else if (h<120) {r=x; g=c;} else if (h<180) {g=c; b=x;}
        else if (h<240) {g=x; b=c;} else if (h<300) {r=x; b=c;} else {r=c; b=x;}
        return [Math.round((r+m)*255), Math.round((g+m)*255), Math.round((b+m)*255)];
    }
    function hsvToRgb(h, s, v) {
        s /= 100; v /= 100;
        const c = v * s, x = c * (1 - Math.abs((h / 60) % 2 - 1)), m = v - c;
        let r=0, g=0, b=0;
        if (h<60) {r=c; g=x;} else if (h<120) {r=x; g=c;} else if (h<180) {g=c; b=x;}
        else if (h<240) {g=x; b=c;} else if (h<300) {r=x; b=c;} else {r=c; b=x;}
        return [Math.round((r+m)*255), Math.round((g+m)*255), Math.round((b+m)*255)];
    }
    function cmykToRgb(c, m, y, k) {
        c /= 100; m /= 100; y /= 100; k /= 100;
        return [Math.round(255*(1-c)*(1-k)), Math.round(255*(1-m)*(1-k)), Math.round(255*(1-y)*(1-k))];
    }
    function yuvToRgb(y, u, v) {
        const r = y + 1.140 * v, g = y - 0.395 * u - 0.581 * v, b = y + 2.032 * u;
        return [Math.max(0, Math.min(255, Math.round(r))), Math.max(0, Math.min(255, Math.round(g))), Math.max(0, Math.min(255, Math.round(b)))];
    }
    function rgbToHsl(r, g, b) {
        r /= 255; g /= 255; b /= 255;
        const max = Math.max(r, g, b), min = Math.min(r, g, b);
        let h, s, l = (max + min) / 2;
        if (max === min) h = s = 0; else {
            const d = max - min; s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
            if (max === r) h = (g - b) / d + (g < b ? 60 : 0);
            else if (max === g) h = (b - r) / d + 2; else h = (r - g) / d + 4;
            h /= 6;
        }
        return [Math.round(h*360), Math.round(s*100), Math.round(l*100)];
    }
    function rgbToHsv(r, g, b) {
        r /= 255; g /= 255; b /= 255;
        const max = Math.max(r, g, b), min = Math.min(r, g, b);
        let h, s, v = max, d = max - min;
        s = max === 0 ? 0 : d / max;
        if (max === min) h = 0; else {
            if (max === r) h = (g - b) / d + (g < b ? 60 : 0);
            else if (max === g) h = (b - r) / d + 2; else h = (r - g) / d + 4;
            h /= 6;
        }
        return [Math.round(h*360), Math.round(s*100), Math.round(v*100)];
    }
    function rgbToCmyk(r, g, b) {
        if (r===0 && g===0 && b===0) return [0, 0, 0, 100];
        let c = 1 - (r / 255), m = 1 - (g / 255), y = 1 - (b / 255), k = Math.min(c, Math.min(m, y));
        return [Math.round((c-k)/(1-k)*100), Math.round((m-k)/(1-k)*100), Math.round((y-k)/(1-k)*100), Math.round(k*100)];
    }
    function rgbToYuv(r, g, b) {
        return [Math.round(0.299*r + 0.587*g + 0.114*b), Math.round(-0.14713*r - 0.28886*g + 0.436*b), Math.round(0.615*r - 0.51499*g - 0.10001*b)];
    }

    function handleModeChange() {
        const mode = modeSel.value; cg4.classList.add('hidden');
        if (mode === "RGB") setupSliders("Red",0,255,0,"", "Green",0,255,170,"", "Blue",0,255,255,"");
        else if (mode === "HSL") setupSliders("Hue",0,360,200,"°", "Saturation",0,100,100,"%", "Lightness",0,100,50,"%");
        else if (mode === "HSV") setupSliders("Hue",0,360,200,"°", "Saturation",0,100,100,"%", "Value (Brightness)",0,100,100,"%");
        else if (mode === "CMYK") {
            cg4.classList.remove('hidden'); setupSliders("Cyan",0,100,100,"%", "Magenta",0,100,33,"%", "Yellow",0,100,0,"%");
            lbl4.textContent = "Black (K)"; s4.min = 0; s4.max = 100; s4.value = 0; s4.dataset.unit = "%";
        } else if (mode === "YUV") setupSliders("Luma (Y)",0,255,129,"", "Chroma U",-112,112,62,"", "Chroma V",-157,157,-113,"");
        updateAll();
    }

    function setupSliders(n1,min1,max1,v1,u1, n2,min2,max2,v2,u2, n3,min3,max3,v3,u3) {
        lbl1.textContent = n1; s1.min = min1; s1.max = max1; s1.value = v1; s1.dataset.unit = u1;
        lbl2.textContent = n2; s2.min = min2; s2.max = max2; s2.value = v2; s2.dataset.unit = u2;
        lbl3.textContent = n3; s3.min = min3; s3.max = max3; s3.value = v3; s3.dataset.unit = u3;
    }

    // Clipboard Copy Mechanics
    window.copyValue = function(val) {
        navigator.clipboard.writeText(val).then(() => {
            toast.style.opacity = "1";
            setTimeout(() => { toast.style.opacity = "0"; }, 1200);
        });
    }

    window.copyTextFromElement = function(id) {
        const txt = document.getElementById(id).textContent;
        copyValue(txt);
    }

    function updateAll() {
        const mode = modeSel.value;
        const v1 = parseInt(s1.value), v2 = parseInt(s2.value), v3 = parseInt(s3.value), v4 = parseInt(s4.value);
        val1.textContent = v1 + (s1.dataset.unit || ""); val2.textContent = v2 + (s2.dataset.unit || "");
        val3.textContent = v3 + (s3.dataset.unit || ""); val4.textContent = v4 + (s4.dataset.unit || "");

        let r=0, g=0, b=0;
        if (mode === "RGB") [r,g,b] = [v1, v2, v3];
        else if (mode === "HSL") [r,g,b] = hslToRgb(v1, v2, v3);
        else if (mode === "HSV") [r,g,b] = hsvToRgb(v1, v2, v3);
        else if (mode === "CMYK") [r,g,b] = cmykToRgb(v1, v2, v3, v4);
        else if (mode === "YUV") [r,g,b] = yuvToRgb(v1, v2, v3);

        const [h, s, l] = rgbToHsl(r, g, b);
        const [hH, sH, vV] = rgbToHsv(r, g, b);
        const [c, m, y, k] = rgbToCmyk(r, g, b);
        const [yY, uU, vV_yuv] = rgbToYuv(r, g, b);
        const hex = "#" + [r, g, b].map(x => x.toString(16).padStart(2, '0')).join('');

        preview.style.backgroundColor = `rgb(${r},${g},${b})`;
        document.getElementById('out-hex').textContent = hex;
        document.getElementById('out-rgb').textContent = `rgb(${r}, ${g}, ${b})`;
        document.getElementById('out-hsl').textContent = `hsl(${h}°, ${s}%, ${l}%)`;
        document.getElementById('out-hsv').textContent = `hsv(${hH}°, ${sH}%, ${vV}%)`;
        document.getElementById('out-cmyk').textContent = `cmyk(${c}%, ${m}%, ${y}%, ${k}%)`;
        document.getElementById('out-yuv').textContent = `yuv(${yY}, ${uU}, ${vV_yuv})`;

        // Build Palette Calculations
        const compRgb = hslToRgb((h + 180) % 360, s, l);
        const an1Rgb = hslToRgb((h + 30) % 360, s, l);
        const an2Rgb = hslToRgb((h - 30 + 360) % 360, s, l);
        const monoRgb = hslToRgb(h, s, Math.max(15, l - 25));

        setPaletteBox('p-comp', compRgb);
        setPaletteBox('p-an1', an1Rgb);
        setPaletteBox('p-an2', an2Rgb);
        setPaletteBox('p-mono', monoRgb);
    }

    function setPaletteBox(id, rgb) {
        const el = document.getElementById(id);
        const hex = "#" + rgb.map(x => x.toString(16).padStart(2, '0')).join('');
        el.style.backgroundColor = hex;
        el.dataset.color = hex;
    }

    modeSel.addEventListener('change', handleModeChange);
    s1.addEventListener('input', updateAll); s2.addEventListener('input', updateAll);
    s3.addEventListener('input', updateAll); s4.addEventListener('input', updateAll);
    handleModeChange();
</script>
</body>
</html>
