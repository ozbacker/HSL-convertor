<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HSL to RGB Converter</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #121214;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .card {
            background: #1a1a1e;
            padding: 24px;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            width: 340px;
        }
        h2 { margin-top: 0; font-weight: 600; text-align: center; }
        .preview {
            width: 100%;
            height: 140px;
            border-radius: 12px;
            margin-bottom: 24px;
            transition: background-color 0.1s ease;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .control-group { margin-bottom: 16px; }
        label { display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 6px; color: #aaa; }
        input[type="range"] {
            width: 100%;
            margin: 0;
            accent-color: #0076ff;
        }
        .outputs {
            background: #26262b;
            padding: 12px;
            border-radius: 8px;
            margin-top: 20px;
        }
        .output-row {
            display: flex;
            justify-content: space-between;
            font-family: monospace;
            font-size: 14px;
            margin-bottom: 6px;
        }
        .output-row:last-child { margin-bottom: 0; }
        .label-text { color: #888; }
        .value-text { color: #00ffcc; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <h2>HSL to RGB</h2>
    <div id="preview" class="preview"></div>

    <div class="control-group">
        <label><span>Hue</span><span id="h-val">200°</span></label>
        <input type="range" id="hue" min="0" max="360" value="200">
    </div>

    <div class="control-group">
        <label><span>Saturation</span><span id="s-val">100%</span></label>
        <input type="range" id="sat" min="0" max="100" value="100">
    </div>

    <div class="control-group">
        <label><span>Lightness</span><span id="l-val">50%</span></label>
        <input type="range" id="light" min="0" max="100" value="50">
    </div>

    <div class="outputs">
        <div class="output-row">
            <span class="label-text">RGB:</span>
            <span id="rgb-out" class="value-text">rgb(0, 149, 255)</span>
        </div>
        <div class="output-row">
            <span class="label-text">HEX:</span>
            <span id="hex-out" class="value-text">#0095ff</span>
        </div>
    </div>
</div>

<script>
    const hueInput = document.getElementById('hue');
    const satInput = document.getElementById('sat');
    const lightInput = document.getElementById('light');
    
    const hVal = document.getElementById('h-val');
    const sVal = document.getElementById('s-val');
    const lVal = document.getElementById('l-val');
    
    const preview = document.getElementById('preview');
    const rgbOut = document.getElementById('rgb-out');
    const hexOut = document.getElementById('hex-out');

    function hslToRgb(h, s, l) {
        s /= 100;
        l /= 100;
        const c = (1 - Math.abs(2 * l - 1)) * s;
        const x = c * (1 - Math.abs((h / 60) % 2 - 1));
        const m = l - c / 2;
        let r = 0, g = 0, b = 0;

        if (0 <= h && h < 60) { r = c; g = x; b = 0; }
        else if (60 <= h && h < 120) { r = x; g = c; b = 0; }
        else if (120 <= h && h < 180) { r = 0; g = c; b = x; }
        else if (180 <= h && h < 240) { r = 0; g = x; b = c; }
        else if (240 <= h && h < 300) { r = x; g = 0; b = c; }
        else if (300 <= h && h <= 360) { r = c; g = 0; b = x; }

        return [
            Math.round((r + m) * 255),
            Math.round((g + m) * 255),
            Math.round((b + m) * 255)
        ];
    }

    function updateColor() {
        const h = parseInt(hueInput.value);
        const s = parseInt(satInput.value);
        const l = parseInt(lightInput.value);

        // Update labels text
        hVal.textContent = h + '°';
        sVal.textContent = s + '%';
        lVal.textContent = l + '%';

        // Calculate RGB array
        const [r, g, b] = hslToRgb(h, s, l);

        // Convert RGB to HEX string
        const hex = "#" + [r, g, b].map(x => {
            const hexStr = x.toString(16);
            return hexStr.length === 1 ? '0' + hexStr : hexStr;
        }).join('');

        // Apply styles and output text strings
        preview.style.backgroundColor = `rgb(${r}, ${g}, ${b})`;
        rgbOut.textContent = `rgb(${r}, ${g}, ${b})`;
        hexOut.textContent = hex;
    }

    // Set up event listeners to listen for real-time slider drags
    hueInput.addEventListener('input', updateColor);
    satInput.addEventListener('input', updateColor);
    lightInput.addEventListener('input', updateColor);

    // Initial load setup
    updateColor();
</script>

</body>
</html>
