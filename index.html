<!<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Color Space Converter</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #121214;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .card {
            background: #1a1a1e;
            padding: 24px;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            width: 360px;
        }
        h2 { margin-top: 0; font-weight: 600; text-align: center; color: #00ffcc; }
        .preview {
            width: 100%;
            height: 120px;
            border-radius: 12px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .select-group {
            margin-bottom: 20px;
        }
        select {
            width: 100%;
            padding: 10px;
            background: #26262b;
            color: white;
            border: 1px solid #444;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
        }
        .control-group { margin-bottom: 16px; }
        label { display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 6px; color: #aaa; }
        input[type="range"] {
            width: 100%;
            margin: 0;
            accent-color: #00ffcc;
        }
        .outputs {
            background: #26262b;
            padding: 14px;
            border-radius: 8px;
            margin-top: 20px;
        }
        .output-title {
            font-size: 12px;
            color: #888;
            text-transform: uppercase;
            margin-bottom: 8px;
            letter-spacing: 1px;
            font-weight: bold;
        }
        .output-row {
            display: flex;
            justify-content: space-between;
            font-family: monospace;
            font-size: 14px;
            margin-bottom: 8px;
        }
        .output-row:last-child { margin-bottom: 0; }
        .label-text { color: #aaa; }
        .value-text { color: #fff; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <h2>Color Hub</h2>
    <div id="preview" class="preview"></div>

    <div class="select-group">
        <label>Select Input Mode:</label>
        <select id="mode-selector">
            <option value="HSL">HSL (Hue, Saturation, Lightness)</option>
            <option value="HSV">HSV (Hue, Saturation, Value)</option>
            <option value="RGB">RGB (Red, Green, Blue)</option>
        </select>
    </div>

    <div class="control-group">
        <label><span id="sl1-lbl">Hue</span><span id="sl1-val">200°</span></label>
        <input type="range" id="slider1" min="0" max="360" value="200">
    </div>

    <div class="control-group">
        <label><span id="sl2-lbl">Saturation</span><span id="sl2-val">100%</span></label>
        <input type="range" id="slider2" min="0" max="100" value="100">
    </div>

    <div class="control-group">
        <label><span id="sl3-lbl">Lightness</span><span id="sl3-val">50%</span></label>
        <input type="range" id="slider3" min="0" max="100" value="50">
    </div>

    <div class="outputs">
        <div class="output-title">Real-time Conversions</div>
        <div class="output-row"><span class="label-text">HEX:</span><span id="out-hex" class="value-text">-</span></div>
        <div class="output-row"><span class="label-text">RGB:</span><span id="out-rgb" class="value-text">-</span></div>
        <div class="output-row"><span class="label-text">HSL:</span><span id="out-hsl" class="value-text">-</span></div>
        <div class="output-row"><span class="label-text">HSV:</span><span id="out-hsv" class="value-text">-</span></div>
        <div class="output-row"><span class="label-text">CMYK:</span><span id="out-cmyk" class="value-text">-</span></div>
        <div class="output-row"><span class="label-text">YUV:</span><span id="out-yuv" class="value-text">-</span></div>
    </div>
</div>

<script>
    // Grab elements
    const modeSel = document.getElementById('mode-selector');
    const s1 = document.getElementById('slider1');
    const s2 = document.getElementById('slider2');
    const s3 = document.getElementById('slider3');
    
    const lbl1 = document.getElementById('sl1-lbl');
    const lbl2 = document.getElementById('sl2-lbl');
    const lbl3 = document.getElementById('sl3-lbl');
    
    const val1 = document.getElementById('sl1-val');
    const val2 = document.getElementById('sl2-val');
    const val3 = document.getElementById('sl3-val');

    const preview = document.getElementById('preview');

    // Math Converter Algorithms
    function hslToRgb(h, s, l) {
        s /= 100; l /= 100;
        const c = (1 - Math.abs(2 * l - 1)) * s;
        const x = c * (1 - Math.abs((h / 60) % 2 - 1));
        const m = l - c / 2;
        let r=0, g=0, b=0;
        if (h<60) {r=c; g=x;} else if (h<120) {r=x; g=c;} else if (h<180) {g=c; b=x;}
        else if (h<240) {g=x; b=c;} else if (h<300) {r=x; b=c;} else {r=c; b=x;}
        return [Math.round((r+m)*255), Math.round((g+m)*255), Math.round((b+m)*255)];
    }

    function hsvToRgb(h, s, v) {
        s /= 100; v /= 100;
        const c = v * s;
        const x = c * (1 - Math.abs((h / 60) % 2 - 1));
        const m = v - c;
        let r=0, g=0, b=0;
        if (h<60) {r=c; g=x;} else if (h<120) {r=x; g=c;} else if (h<180) {g=c; b=x;}
        else if (h<240) {g=x; b=c;} else if (h<300) {r=x; b=c;} else {r=c; b=x;}
        return [Math.round((r+m)*255), Math.round((g+m)*255), Math.round((b+m)*255)];
    }

    function rgbToHsl(r, g, b) {
        r /= 255; g /= 255; b /= 255;
        const max = Math.max(r, g, b), min = Math.min(r, g, b);
        let h, s, l = (max + min) / 2;
        if (max === min) { h = s = 0; } else {
            const d = max - min;
            s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
            switch (max) {
                case r: h = (g - b) / d + (g < b ? 60 : 0); break;
                case g: h = (b - r) / d + 2; break;
                case b: h = (r - g) / d + 4; break;
            }
            h /= 6;
        }
        return [Math.round(h*360), Math.round(s*100), Math.round(l*100)];
    }

    function rgbToHsv(r, g, b) {
        r /= 255; g /= 255; b /= 255;
        const max = Math.max(r, g, b), min = Math.min(r, g, b);
        let h, s, v = max;
        const d = max - min;
        s = max === 0 ? 0 : d / max;
        if (max === min) { h = 0; } else {
            switch (max) {
                case r: h = (g - b) / d + (g < b ? 60 : 0); break;
                case g: h = (b - r) / d + 2; break;
                case b: h = (r - g) / d + 4; break;
            }
            h /= 6;
        }
        return [Math.round(h*360), Math.round(s*100), Math.round(v*100)];
    }

    function rgbToCmyk(r, g, b) {
        if (r===0 && g===0 && b===0) return [0, 0, 0, 100];
        let c = 1 - (r / 255);
        let m = 1 - (g / 255);
        let y = 1 - (b / 255);
        let k = Math.min(c, Math.min(m, y));
        c = (c - k) / (1 - k);
        m = (m - k) / (1 - k);
        y = (y - k) / (1 - k);
        return [Math.round(c*100), Math.round(m*100), Math.round(y*100), Math.round(k*100)];
    }

    function rgbToYuv(r, g, b) {
        // Standard BT.601 television weights matrix
        const y = 0.299 * r + 0.587 * g + 0.114 * b;
        const u = -0.14713 * r - 0.28886 * g + 0.436 * b;
        const v = 0.615 * r - 0.51499 * g - 0.10001 * b;
        return [Math.round(y), Math.round(u), Math.round(v)];
    }

    // Handles user switching between drop-down modes
    function handleModeChange() {
        const mode = modeSel.value;
        if (mode === "HSL") {
            setupSliders("Hue", 0, 360, 200, "°", "Saturation", 0, 100, 100, "%", "Lightness", 0, 100, 50, "%");
        } else if (mode === "HSV") {
            setupSliders("Hue", 0, 360, 200, "°", "Saturation", 0, 100, 100, "%", "Value (Brightness)", 0, 100, 100, "%");
        } else if (mode === "RGB") {
            setupSliders("Red", 0, 255, 0, "", "Green", 0, 255, 149, "", "Blue", 0, 255, 255, "");
        }
        updateAll();
    }

    function setupSliders(n1,min1,max1,v1,u1, n2,min2,max2,v2,u2, n3,min3,max3,v3,u3) {
        lbl1.textContent = n1; s1.min = min1; s1.max = max1; s1.value = v1; s1.dataset.unit = u1;
        lbl2.textContent = n2; s2.min = min2; s2.max = max2; s2.value = v2; s2.dataset.unit = u2;
        lbl3.textContent = n3; s3.min = min3; s3.max = max3; s3.value = v3; s3.dataset.unit = u3;
    }

    function updateAll() {
        const mode = modeSel.value;
        const v1 = parseInt(s1.value);
        const v2 = parseInt(s2.value);
        const v3 = parseInt(s3.value);

        val1.textContent = v1 + (s1.dataset.unit || "");
        val2.textContent = v2 + (s2.dataset.unit || "");
        val3.textContent = v3 + (s3.dataset.unit || "");

        let r=0, g=0, b=0;

        // Base everything off our slider input mode first
        if (mode === "HSL") [r,g,b] = hslToRgb(v1, v2, v3);
        else if (mode === "HSV") [r,g,b] = hsvToRgb(v1, v2, v3);
        else if (mode === "RGB") [r,g,b] = [v1, v2, v3];

        // Process final targets
        const [h, s, l] = rgbToHsl(r, g, b);
        const [hH, sH, vV] = rgbToHsv(r, g, b);
        const [c, m, y, k] = rgbToCmyk(r, g, b);
        const [yY, uU, vV_yuv] = rgbToYuv(r, g, b);
        const hex = "#" + [r, g, b].map(x => x.toString(16).padStart(2, '0')).join('');

        // Print outputs to screen HTML elements
        preview.style.backgroundColor = `rgb(${r},${g},${b})`;
        document.getElementById('out-hex').textContent = hex;
        document.getElementById('out-rgb').textContent = `rgb(${r}, ${g}, ${b})`;
        document.getElementById('out-hsl').textContent = `hsl(${h}°, ${s}%, ${l}%)`;
        document.getElementById('out-hsv').textContent = `hsv(${hH}°, ${sH}%, ${vV}%)`;
        document.getElementById('out-cmyk').textContent = `cmyk(${c}%, ${m}%, ${y}%, ${k}%)`;
        document.getElementById('out-yuv').textContent = `yuv(${yY}, ${uU}, ${vV_yuv})`;
    }

    // Event hooks
    modeSel.addEventListener('change', handleModeChange);
    s1.addEventListener('input', updateAll);
    s2.addEventListener('input', updateAll);
    s3.addEventListener('input', updateAll);

    // Bootstrap
    handleModeChange();
</script>
</body>
</html>
